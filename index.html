<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Recommendation System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <script>
        // Check for saved dark mode preference or system preference
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.25);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.45);
        }

        /* Active sidebar nav item */
        .sidebar-nav-active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.12) 0%, rgba(139, 92, 246, 0.12) 100%) !important;
            color: #4f46e5 !important;
            font-weight: 700 !important;
            border-left: 3px solid #6366f1;
        }

        .dark .sidebar-nav-active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%) !important;
            color: #a5b4fc !important;
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* Polished input styling */
        input:not([type='file']):not([type='checkbox']):not([type='radio']),
        textarea,
        select {
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:not([type='file']):not([type='checkbox']):not([type='radio']):focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        /* AI Chat Widget Styles */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
        }

        .chat-button {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .chat-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
        }

        /* Toast Animation */
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        .toast-enter {
            animation: slideInRight 0.3s ease-out forwards;
        }

        .toast-exit {
            animation: slideOutRight 0.3s ease-in forwards;
        }

        .chat-container {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 380px;
            max-height: 500px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .dark .chat-container {
            background: rgba(31, 41, 55, 0.92);
            border: 1px solid rgba(75, 85, 99, 0.5);
        }

        .chat-container.open {
            display: flex;
            animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            max-height: 320px;
            min-height: 200px;
        }

        .chat-message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
        }

        .chat-message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .chat-message.bot {
            background: rgba(243, 244, 246, 0.8);
            color: #374151;
        }

        .dark .chat-message.bot {
            background: rgba(55, 65, 81, 0.8);
            color: #d1d5db;
        }

        .chat-message.bot.loading {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-message.bot.loading .dot {
            width: 10px;
            height: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .chat-message.bot.loading .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .chat-message.bot.loading .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        .chat-message.bot.loading .thinking-text {
            margin-left: 8px;
            color: #667eea;
            font-size: 14px;
            animation: pulse 1.5s infinite;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .chat-send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #667eea;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .chat-send-btn:hover {
            background: #5a67d8;
        }

        .chat-send-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>

    <script>
        // Configuration
        const API_BASE_URL = 'http://127.0.0.1:5000/api';

        // State Management
        let currentUser = null;
        let currentView = 'home';
        let jobs = [];
        let externalJobs = [];
        let currentJobTab = 'local'; // 'local' or 'external'
        let recommendations = [];
        let minMatchThreshold = 50; // Default minimum match threshold (0-100%)
        let chatOpen = false;
        let chatLoading = false;
        let userDocuments = { resume_file: null, cover_letter_file: null };
        let appliedJobs = []; // Track jobs the user has applied to
        let bookmarkedJobs = []; // Track jobs the user has bookmarked

        // ==================== AI CHAT FUNCTIONS ====================

        function toggleChat() {
            chatOpen = !chatOpen;
            const container = document.getElementById('chatContainer');
            if (chatOpen) {
                container.classList.add('open');
            } else {
                container.classList.remove('open');
            }
        }

        function addChatMessage(message, isUser = false) {
            const messagesDiv = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message ${isUser ? 'user' : 'bot'}`;

            if (isUser) {
                msgDiv.textContent = message;
            } else {
                // Clean up AI response formatting
                let formatted = message
                    // Remove markdown headers
                    .replace(/^#{1,3}\s*/gm, '')
                    // Remove horizontal rules
                    .replace(/^-{3,}$/gm, '')
                    .replace(/^\*{3,}$/gm, '')
                    // Remove bold markdown
                    .replace(/\*\*([^*]+)\*\*/g, '$1')
                    // Remove italic markdown
                    .replace(/\*([^*]+)\*/g, '$1')
                    // Remove backticks
                    .replace(/`([^`]+)`/g, '$1')
                    // Replace special symbols
                    .replace(/→/g, '-')
                    .replace(/💎/g, '')
                    .replace(/🔹/g, '•')
                    .replace(/🔸/g, '•')
                    // Clean up empty lines
                    .replace(/^\s*$/gm, '')
                    // Convert newlines for HTML
                    .replace(/\n\n+/g, '<br><br>')
                    .replace(/\n/g, '<br>')
                    // Clean up multiple <br> tags
                    .replace(/(<br>){3,}/g, '<br><br>');
                msgDiv.innerHTML = formatted;
            }

            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addLoadingMessage() {
            const messagesDiv = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message bot loading';
            msgDiv.id = 'loadingMessage';
            msgDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div><span class="thinking-text">Thinking...</span>';
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeLoadingMessage() {
            const loadingMsg = document.getElementById('loadingMessage');
            if (loadingMsg) loadingMsg.remove();
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message || chatLoading) return;

            // Add user message
            addChatMessage(message, true);
            input.value = '';

            // Show loading
            chatLoading = true;
            document.getElementById('chatSendBtn').disabled = true;
            addLoadingMessage();

            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        email: currentUser ? currentUser.email : ''
                    })
                });

                const data = await response.json();
                removeLoadingMessage();

                if (data.response) {
                    addChatMessage(data.response);
                } else if (data.error) {
                    addChatMessage('⚠️ ' + data.error);
                } else {
                    addChatMessage('Sorry, I could not process your request. Please try again.');
                }
            } catch (error) {
                removeLoadingMessage();
                addChatMessage('⚠️ Could not connect to AI. Make sure Ollama is running with qwen3:8b model.');
                console.error('Chat error:', error);
            }

            chatLoading = false;
            document.getElementById('chatSendBtn').disabled = false;
        }

        // Now a modern Toast Notification
        function showMessage(title, message, isError = false) {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            const toast = document.createElement('div');
            // Give pointer-events-auto so we can click the close button if we want,
            // while the container itself is pointer-events-none so it doesn't block clicks beneath empty space
            toast.className = `toast-enter pointer-events-auto max-w-sm w-full bg-white/90 dark:bg-gray-800/90 backdrop-blur-xl shadow-lg rounded-xl overflow-hidden border-l-4 ${isError ? 'border-red-500' : 'border-indigo-500'} border border-white/50 dark:border-gray-700/50`;

            // Icon based on type
            const iconSvg = isError
                ? `<svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
                : `<svg class="w-6 h-6 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;

            toast.innerHTML = `
                <div class="p-4 flex items-start gap-3">
                    <div class="flex-shrink-0 mt-0.5">
                        ${iconSvg}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-gray-900 dark:text-white">${title}</p>
                        <p class="text-sm text-gray-600 dark:text-gray-300 mt-1 break-words">${message}</p>
                    </div>

        // ==================== API FUNCTIONS ====================

        async function apiCall(endpoint, method = 'GET', data = null) {
            const url = `${API_BASE_URL}${endpoint}`;
            try {
                const options = {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                    }
                };

                if (data) {
                    options.body = JSON.stringify(data);
                }

                const response = await fetch(url, options);

                if (!response.ok) {
                    const errorBody = await response.json().catch(() => ({}));
                    const errorMessage = errorBody.error || `HTTP Error ${response.status}: ${response.statusText}`;
                    throw new Error(errorMessage);
                }

                return await response.json();
            } catch (error) {
                let errorMsg = error.message;

                if (errorMsg.includes('Failed to fetch') || errorMsg.includes('load failed')) {
                    errorMsg = `Could not connect to the backend server at ${url}. Please ensure your Python Flask app (app.py) is running on http://127.0.0.1:5000 and try again.`;
                }

                console.error('API Error:', errorMsg);
                showMessage('API Communication Error', errorMsg, true);
                return null;
            }
        }

        async function handleResumeUpload(event, targetInputId) {
            const file = event.target.files[0];
            if (!file) return;

            // Client-side format validation — PDF and DOCX only
            const validation = validateDocumentType(file.name);
            if (!validation.valid) {
                showMessage('Invalid File Format', `"${validation.ext}" is not allowed. Only PDF (.pdf) and Word (.docx) files are accepted. Please upload a valid resume.`, true);
                event.target.value = '';
                return;
            }

            // Determine which status element to use
            const isEdit = targetInputId === 'editSkills';
            const statusEl = document.getElementById(isEdit ? 'editResumeUploadStatus' : 'resumeUploadStatus');

            // Show loading
            if (statusEl) statusEl.classList.remove('hidden');

            try {
                const formData = new FormData();
                formData.append('resume', file);
                // Include email so the backend can save the file to user's profile
                const email = currentUser ? currentUser.email : (document.getElementById('email')?.value || '').trim().toLowerCase();
                if (email) formData.append('email', email);

                const response = await fetch(`${API_BASE_URL}/upload-resume`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                // Hide loading
                if (statusEl) statusEl.classList.add('hidden');

                if (result.success || result.resume_saved) {
                    // Update saved file indicator
                    if (result.resume_filename) {
                        userDocuments.resume_file = result.resume_filename;
                        updateDocumentIndicator('resume', result.resume_filename, isEdit);
                    }

                    // Auto-fill extracted data
                    let extractedCount = 0;
                    const prefix = isEdit ? 'edit' : '';

                    if (result.skills && result.skills.length > 0) {
                        const skillsInput = document.getElementById(isEdit ? 'editSkills' : 'skills');
                        if (skillsInput) {
                            // If there are existing skills, append to them, otherwise replace
                            const existing = skillsInput.value.trim();
                            const newSkills = result.skills.join(', ');
                            skillsInput.value = existing ? `${existing}, ${newSkills}` : newSkills;
                            extractedCount++;
                        }
                    }

                    if (result.personal_info) {
                        const info = result.personal_info;

                        // Auto-fill Name
                        const nameInput = document.getElementById(isEdit ? 'editName' : 'name');
                        if (nameInput && info.name && !nameInput.value.trim()) {
                            nameInput.value = info.name;
                            extractedCount++;
                        }

                        const phoneInput = document.getElementById(isEdit ? 'editPhone' : 'phone');
                        if (phoneInput && info.phone && !phoneInput.value.trim()) {
                            phoneInput.value = info.phone;
                            extractedCount++;
                        }

                        // Auto-fill Email (Only on Registration)
                        if (!isEdit && info.email) {
                            const emailInput = document.getElementById('email');
                            if (emailInput && !emailInput.value.trim()) {
                                emailInput.value = info.email;
                                extractedCount++;
                            }
                        }

                        const locInput = document.getElementById(isEdit ? 'editLocation' : 'location');
                        if (locInput && info.location && !locInput.value.trim()) {
                            locInput.value = info.location;
                            extractedCount++;
                        }

                        const bioInput = document.getElementById(isEdit ? 'editBio' : 'bio');
                        if (bioInput && info.bio && !bioInput.value.trim()) {
                            bioInput.value = info.bio;
                            extractedCount++;
                        }
                    }

                    if (extractedCount > 0) {
                        showMessage('Resume Uploaded & Parsed', `Your resume was saved and we automatically filled ${extractedCount} sections of your profile!`);
                    } else {
                        showMessage('Resume Uploaded', 'Your resume has been successfully saved to your profile for Easy Apply!');
                    }
                } else {
                    showMessage('Upload Failed', result.error || 'Failed to upload resume.', true);
                }
            } catch (error) {
                if (statusEl) statusEl.classList.add('hidden');
                showMessage('Upload Error', 'Failed to upload resume. Please try again.', true);
                console.error('Resume upload error:', error);
            }
        }

        async function toggleBookmark(jobBase64, btnElement) {
            if (!currentUser) {
                showMessage('Login Required', 'Please login to bookmark jobs.', true);
                return;
            }

            const jobData = JSON.parse(decodeURIComponent(escape(atob(jobBase64))));
            const isSaved = isJobBookmarked(jobData.title, jobData.company);

            try {
                if (isSaved) {
                    const result = await apiCall('/bookmarks', 'DELETE', {
                        email: currentUser.email,
                        job_title: jobData.title,
                        job_company: jobData.company
                    });
                    if (result && result.success) {
                        bookmarkedJobs = bookmarkedJobs.filter(app => !(app.title === jobData.title && app.company === jobData.company));
                        showMessage('Bookmark Removed', 'Job removed from your saved jobs.', false);
                    }
                } else {
                    const result = await apiCall('/bookmarks', 'POST', {
                        email: currentUser.email,
                        job: jobData
                    });
                    if (result && result.success) {
                        bookmarkedJobs.push(jobData);
                        showMessage('Job Saved', 'Job added to your saved jobs.', false);
                    }
                }

                // Update button UI
                const newIsSaved = isJobBookmarked(jobData.title, jobData.company);
                if (newIsSaved) {
                    btnElement.innerHTML = '🔖 Saved';
                    btnElement.classList.replace('text-gray-500', 'text-yellow-500');
                } else {
                    btnElement.innerHTML = '🔖 Save Job';
                    btnElement.classList.replace('text-yellow-500', 'text-gray-500');
                }

                // Refresh views if necessary
                if (currentView === 'jobs' || currentView === 'savedJobs') {
                    // Update main views if we are on them
                    // Since it replaces DOM, we just rely on button UI update above
                    // unless we are rendering the whole list
                    if (currentView === 'savedJobs') {
                        renderSavedJobs();
                    }
                }

            } catch (error) {
                showMessage('Error', 'Failed to toggle bookmark.', true);
            }
        }

        function renderExtractedSkills(containerEl, targetInputId) {
            if (!containerEl) return;

            containerEl.innerHTML = extractedSkillsData.map((skill, index) => `

                        onclick="toggleSkill(${index}, '${targetInputId}')"
                        class="skill-chip px-3 py-1.5 rounded-full text-sm font-medium transition-all duration-200 ${skill.selected
                    ? 'bg-green-500 text-white shadow-md'
                    : 'bg-gray-200 text-gray-600 opacity-60'
                }"
                        data-index="${index}">
                    ${skill.selected ? '✓ ' : ''}${skill.name}
                </button>
            `).join('');
        }

        function toggleSkill(index, targetInputId) {
            if (extractedSkillsData[index]) {
                extractedSkillsData[index].selected = !extractedSkillsData[index].selected;

                const isEdit = targetInputId === 'editSkills';
                const containerEl = document.getElementById(isEdit ? 'editExtractedSkillsContainer' : 'extractedSkillsContainer');
                renderExtractedSkills(containerEl, targetInputId);
            }
        }

        function applySelectedSkills(targetInputId) {
            const selectedSkills = extractedSkillsData
                .filter(skill => skill.selected)
                .map(skill => skill.name)
                .join(', ');

            const targetInput = document.getElementById(targetInputId);
            if (targetInput) {
                // Append to existing skills if any, or replace
                const existing = targetInput.value.trim();
                if (existing) {
                    // Merge existing and new, removing duplicates
                    const existingSet = new Set(existing.split(',').map(s => s.trim().toLowerCase()));
                    const newSkills = extractedSkillsData
                        .filter(skill => skill.selected && !existingSet.has(skill.name.toLowerCase()))
                        .map(skill => skill.name);

                    if (newSkills.length > 0) {
                        targetInput.value = existing + ', ' + newSkills.join(', ');
                    }
                } else {
                    targetInput.value = selectedSkills;
                }

                // Hide the extracted skills section
                const isEdit = targetInputId === 'editSkills';
                const skillsSectionEl = document.getElementById(isEdit ? 'editExtractedSkillsSection' : 'extractedSkillsSection');
                if (skillsSectionEl) skillsSectionEl.classList.add('hidden');

                showMessage('Skills Applied', 'Selected skills have been added to your profile!');
            }
        }

                salaryText = `RM ${jobData.salary_min.toLocaleString()} - RM ${jobData.salary_max.toLocaleString()}`;

        // OTP countdown timer state
        let otpCountdownInterval = null;
        let otpSecondsLeft = 120;

        function startOtpCountdown() {
            // Clear any existing timer
            if (otpCountdownInterval) clearInterval(otpCountdownInterval);
            otpSecondsLeft = 120;
            updateCountdownDisplay();

            otpCountdownInterval = setInterval(() => {
                otpSecondsLeft--;
                updateCountdownDisplay();

                if (otpSecondsLeft <= 0) {
                    clearInterval(otpCountdownInterval);
                    otpCountdownInterval = null;
                    // Disable verify button and show expired message
                    const verifyBtn = document.getElementById('otpVerifyBtn');
                    const countdownEl = document.getElementById('otpCountdown');
                    if (verifyBtn) {
                        verifyBtn.disabled = true;
                        verifyBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    }
                    if (countdownEl) {
                        countdownEl.innerHTML = `<span class="text-red-600 font-semibold">⚠️ Code expired. Please request a new one.</span>`;
                    }
                }
            }, 1000);
        }

        function updateCountdownDisplay() {
            const countdownEl = document.getElementById('otpCountdown');
            if (!countdownEl) return;
            const mins = Math.floor(otpSecondsLeft / 60);
            const secs = otpSecondsLeft % 60;
            const timeStr = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            const isUrgent = otpSecondsLeft <= 30;
            countdownEl.innerHTML = `Code expires in: <span class="font-bold ${isUrgent ? 'text-red-600 animate-pulse' : 'text-indigo-600'}">${timeStr}</span>`;
        }

        function updatePasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const s1 = document.getElementById('strength1');
            const s2 = document.getElementById('strength2');
            const s3 = document.getElementById('strength3');
            const s4 = document.getElementById('strength4');
            const text = document.getElementById('strengthText');

            // Reset all
            [s1, s2, s3, s4].forEach(s => s.className = 'h-2 flex-1 bg-gray-200 rounded');

            // Check each requirement
            const hasMinLength = password.length >= 8;
            const hasUppercase = /[A-Z]/.test(password);
            const hasLowercase = /[a-z]/.test(password);
            const hasSymbol = /[!@#$%^&*(),.?":{}|<>]/.test(password);

            let strength = 0;
            if (hasMinLength) strength++;
            if (hasUppercase) strength++;
            if (hasLowercase) strength++;
            if (hasSymbol) strength++;

            // Build feedback message
            if (password.length === 0) {
                text.innerHTML = 'Requires: 8+ chars, uppercase, lowercase, symbol';
                text.className = 'text-sm text-gray-500';
            } else if (strength < 4) {
                let missing = [];
                if (!hasMinLength) missing.push('8+ chars');
                if (!hasUppercase) missing.push('uppercase');
                if (!hasLowercase) missing.push('lowercase');
                if (!hasSymbol) missing.push('symbol');
                text.innerHTML = '❌ Missing: ' + missing.join(', ');
                text.className = 'text-sm text-red-500';
            }

            if (strength === 1) {
                s1.className = 'h-2 flex-1 bg-red-500 rounded';
            } else if (strength === 2) {
                s1.className = 'h-2 flex-1 bg-orange-500 rounded';
                s2.className = 'h-2 flex-1 bg-orange-500 rounded';
            } else if (strength === 3) {
                s1.className = 'h-2 flex-1 bg-yellow-500 rounded';
                s2.className = 'h-2 flex-1 bg-yellow-500 rounded';
                s3.className = 'h-2 flex-1 bg-yellow-500 rounded';
            } else if (strength === 4) {
                s1.className = 'h-2 flex-1 bg-green-500 rounded';
                s2.className = 'h-2 flex-1 bg-green-500 rounded';
                s3.className = 'h-2 flex-1 bg-green-500 rounded';
                s4.className = 'h-2 flex-1 bg-green-500 rounded';
                text.innerHTML = '✅ Strong password!';
                text.className = 'text-sm text-green-600';
            }
        }

        function filterLocalJobsGrid() {
            const searchKeyword = document.getElementById('localJobSearch')?.value.toLowerCase() || '';
            const stateFilter = document.getElementById('localStateFilter')?.value.toLowerCase() || '';

            const cards = document.querySelectorAll('.local-job-card');
            let visibleCount = 0;

            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                const locationText = card.querySelector('.job-location')?.textContent.toLowerCase() || '';

                const matchesKeyword = searchKeyword === '' || text.includes(searchKeyword);
                const matchesState = stateFilter === '' || locationText.includes(stateFilter);

                if (matchesKeyword && matchesState) {
                    card.style.display = 'block';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            const noResultsMsg = document.getElementById('localNoResultsMsg');
            if (noResultsMsg) {
                noResultsMsg.style.display = visibleCount === 0 ? 'block' : 'none';
            }
        }

        // ==================== APPLICATION STATUS UPDATE ====================
        async function updateAppStatusDirect(appDataStr, newStatus) {
            if (!currentUser) return;

            const appData = JSON.parse(decodeURIComponent(escape(atob(appDataStr))));
            const { job_title, job_company, status: oldStatus } = appData;

            if (oldStatus === newStatus) return;

            // Optimistic local update
            const appIndex = appliedJobs.findIndex(a => a.job_title === job_title && a.job_company === job_company);
            if (appIndex !== -1) {
                appliedJobs[appIndex].status = newStatus;
                changeView('applications'); // re-render to update colors
            }

            // Backend update
            try {
                const result = await apiCall('/application-status', 'PUT', {
                    email: currentUser.email,
                    job_title: job_title,
                    job_company: job_company,
                    status: newStatus
                });
                if (!result || !result.success) {
                    throw new Error(result?.error || 'Update failed');
                }
                showMessage('Status Updated', `Application status changed to ${newStatus}`, false);
            } catch (error) {
                // Revert on failure
                if (appIndex !== -1) {
                    appliedJobs[appIndex].status = oldStatus;
                    changeView('applications');
                }
                showMessage('Error', 'Failed to update application status.', true);
            }
        }

        async function handleForgotPassword() {
            const emailInput = document.getElementById('forgotEmail');
            const email = emailInput ? emailInput.value.trim() : resetEmail;

            if (!email) {
                showMessage('Error', 'Please enter your email address.', true);
                return;
            }

            const result = await forgotPassword(email);
            if (result && result.success) {
                resetEmail = email;  // Save email for next steps
                showMessage('Code Sent', result.message, false);
                changeView('verifyCode');
                // Start countdown timer after DOM renders
                setTimeout(() => startOtpCountdown(), 50);
            }
        }

        async function handleVerifyCode() {
            const codeInput = document.getElementById('resetCode');
            const code = codeInput ? codeInput.value.trim() : '';

            if (!code || code.length !== 6) {
                showMessage('Error', 'Please enter the 6-digit code.', true);
                return;
            }

            const result = await apiCall('/verify_reset_code', 'POST', {
                email: resetEmail,
                code: code
            });

            if (result && result.valid) {
                // Clear the countdown timer on successful verification
                if (otpCountdownInterval) {
                    clearInterval(otpCountdownInterval);
                    otpCountdownInterval = null;
                }
                resetCode = code;  // Save code for password reset
                showMessage('Code Verified', 'Now set your new password.', false);
                changeView('resetPassword');
            } else {
                showMessage('Invalid Code', result?.error || 'The code is incorrect or expired.', true);
            }
        }

        async function handleResetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || !confirmPassword) {
                showMessage('Error', 'Please fill in both password fields.', true);
                return;
            }

            if (newPassword.length < 6) {
                showMessage('Error', 'Password must be at least 6 characters.', true);
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('Error', 'Passwords do not match.', true);
                return;
            }

            const result = await apiCall('/reset_password_with_code', 'POST', {
                email: resetEmail,
                code: resetCode,
                new_password: newPassword
            });

            if (result && result.success) {
                showMessage('Password Reset', result.message, false);
                resetEmail = '';
                resetCode = '';
                changeView('login');
            } else {
                showMessage('Error', result?.error || 'Failed to reset password.', true);
            }
        }

        async function handleRegister() {
            const userData = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                password: document.getElementById('password').value,
                skills: document.getElementById('skills').value.trim(),
                experience: document.getElementById('experience').value.trim(),
                bio: document.getElementById('bio').value.trim(),
                location: document.getElementById('location').value.trim()
            };

            const fields = ['name', 'email', 'phone', 'password', 'skills', 'experience', 'bio', 'location'];
            for (const field of fields) {
                if (!userData[field]) {
                    showMessage('Registration Error', `Please fill in the required field: ${field}.`, true);
                    return;
                }
            }
            if (isNaN(parseInt(userData.experience))) {
                showMessage('Registration Error', 'Years of Experience must be a number.', true);
                return;
            }

            // Password strength validation
            if (userData.password.length < 8) {
                showMessage('Registration Error', 'Password must be at least 8 characters.', true);
                return;
            }
            if (!/[A-Z]/.test(userData.password)) {
                showMessage('Registration Error', 'Password must contain at least one uppercase letter.', true);
                return;
            }
            if (!/[a-z]/.test(userData.password)) {
                showMessage('Registration Error', 'Password must contain at least one lowercase letter.', true);
                return;
            }
            if (!/[!@#$%^&*(),.?":{}|<>]/.test(userData.password)) {
                showMessage('Registration Error', 'Password must contain at least one special symbol (!@#$%^&* etc).', true);
                return;
            }

            const confirmPassword = document.getElementById('confirmRegPassword').value;
            if (userData.password !== confirmPassword) {
                showMessage('Registration Error', 'Passwords do not match.', true);
                return;
            }

            const result = await registerUser(userData);
            if (result) {
                currentUser = null;
                showMessage('Registration Successful', result.message, false);
                changeView('login');
            }
        }

            const updatedData = {
                email: currentUser.email,
                name: document.getElementById('editName').value.trim(),
                phone: document.getElementById('editPhone').value.trim(),
                skills: document.getElementById('editSkills').value.trim(),
                experience: document.getElementById('editExperience').value.trim(),
                bio: document.getElementById('editBio').value.trim(),
                location: document.getElementById('editLocation').value.trim(),
                new_password: document.getElementById('editPassword').value
            };

            const fields = ['name', 'phone', 'skills', 'experience', 'bio', 'location'];
            for (const field of fields) {
                if (!updatedData[field]) {
                    showMessage('Update Error', `Please fill in the required field: ${field}.`, true);
                    return;
                }
            }
            if (isNaN(parseInt(updatedData.experience))) {
                showMessage('Update Error', 'Years of Experience must be a number.', true);
                return;
            }

            // Password strength validation for profile update
            if (updatedData.new_password) {
                if (updatedData.new_password.length < 8) {
                    showMessage('Update Error', 'New Password must be at least 8 characters.', true);
                    return;
                }
                if (!/[A-Z]/.test(updatedData.new_password)) {
                    showMessage('Update Error', 'New Password must contain at least one uppercase letter.', true);
                    return;
                }
                if (!/[a-z]/.test(updatedData.new_password)) {
                    showMessage('Update Error', 'New Password must contain at least one lowercase letter.', true);
                    return;
                }
                if (!/[!@#$%^&*(),.?":{}|<>]/.test(updatedData.new_password)) {
                    showMessage('Update Error', 'New Password must contain at least one special symbol (!@#$%^&* etc).', true);
                    return;
                }
            }

            const result = await updateProfile(updatedData);
            if (result) {
                currentUser = result.user;

        async function handleEasyApply(jobTitle, jobCompany, jobLocation, jobSource) {
            if (!currentUser) {
                showMessage('Login Required', 'Please login to apply for jobs.', true);
                changeView('login');
                return;
            }

            // Check if documents are uploaded
            if (!userDocuments.resume_file) {
                showMessage('Resume Required', 'Please upload your resume (PDF or DOCX) before applying. Go to Edit Profile to upload.', true);
                changeView('editProfile');
                return;
            }


            // Set the current job and go to confirmation page
            currentApplyingJob = {
                title: jobTitle,
                company: jobCompany,
                location: jobLocation,
                source: jobSource
            };

            pendingCoverLetterFile = null;
            changeView('applicationConfirm');
        }

        async function submitEasyApply() {
            if (!currentApplyingJob || !currentUser) return;

            const submitBtn = document.getElementById('submitAppBtn');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<svg class="animate-spin h-5 w-5 mr-3 inline-block" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Submitting...';
            }

            // Send Easy Apply request
            try {
                // 1. Process Cover Letter if provided
                const textArea = document.getElementById('aiCoverLetterText');
                const textVal = textArea ? textArea.value.trim() : '';

                if (pendingCoverLetterFile) {
                    const formData = new FormData();
                    formData.append('email', currentUser.email);
                    formData.append('file', pendingCoverLetterFile);
                    formData.append('type', 'cover_letter');

                    const uploadRes = await fetch('/api/upload-cover-letter', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await uploadRes.json();
                    if (!result.success) throw new Error(result.error || 'Failed to upload cover letter');
                    userDocuments.cover_letter_file = result.filename;
                } else if (textVal) {
                    const result = await apiCall('/save-generated-cover-letter', 'POST', {
                        email: currentUser.email,
                        text: textVal
                    });
                    if (!result || !result.success) throw new Error(result?.error || 'Failed to save cover letter text');
                    userDocuments.cover_letter_file = result.filename;
                }

                // 2. Submit Easy Apply request
                const result = await apiCall('/easy-apply', 'POST', {
                    email: currentUser.email,
                    job_title: currentApplyingJob.title,
                    job_company: currentApplyingJob.company,
                    job_location: currentApplyingJob.location,
                    job_source: currentApplyingJob.source
                });

                if (result && result.success) {
                    // Add to local applied jobs list
                    appliedJobs.push({
                        job_title: currentApplyingJob.title,
                        job_company: currentApplyingJob.company,
                        applied_at: new Date().toISOString(),
                        job_location: currentApplyingJob.location
                    });
                    currentApplyingJob = null; // Clear state
                    pendingCoverLetterFile = null;
                    showMessage('Application Submitted! 🎉', result.message);
                    // Redirect to My Applications
                    changeView('applications');
                } else if (result && result.already_applied) {
                    showMessage('Already Applied', 'You have already applied to this job.', true);
                    changeView('recommendations');
                } else if (result && result.missing === 'resume') {
                    showMessage('Resume Required', result.error, true);
                    changeView('editProfile');
                } else {
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = 'Submit Application';
                    }
                }
            } catch (error) {
                showMessage('Apply Error', error.message || 'Failed to submit application. Please try again.', true);
                console.error('Easy apply error:', error);
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Submit Application';
                }
            }
        }

            btn.innerHTML = '<svg class="animate-spin h-4 w-4 mr-1 inline-block" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Generating...';

                required_skills: document.getElementById('jobSkills').value.trim(),
                experience_required: document.getElementById('jobExperience').value.trim(),
                location: document.getElementById('jobLocation').value.trim()
            };

            const fields = ['title', 'company', 'description', 'required_skills', 'experience_required', 'location'];
            for (const field of fields) {
                if (!jobData[field]) {
                    showMessage('Post Job Error', `Please fill in the required field: ${field}.`, true);
                    return;
                }
            }
            if (isNaN(parseInt(jobData.experience_required))) {
                showMessage('Post Job Error', 'Experience Required must be a number.', true);
                return;
            }

            const result = await postJob(jobData);
            if (result) {
                showMessage('Job Posted', `Job "${result.job.title}" posted successfully!`);
                await loadJobs();
                changeView('jobs');
            }
        }

        function logout() {
            currentUser = null;
            recommendations = [];
            showMessage('Logout', 'You have been successfully logged out.');
            changeView('home');
        }

        function renderSkeletonGrid() {
            const skeletonCard = `
                <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md p-6 rounded-xl shadow-lg border border-white/50 dark:border-gray-700/50 animate-pulse">
                    <div class="flex justify-between items-start mb-4">
                        <div class="space-y-2 w-2/3">
                            <div class="h-6 bg-gray-200 dark:bg-gray-700 rounded w-3/4"></div>
                            <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/2"></div>
                        </div>
                        <div class="h-6 bg-gray-200 dark:bg-gray-700 rounded w-16"></div>
                    </div>
                    <div class="space-y-2 mb-4">
                        <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-full"></div>
                        <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-5/6"></div>
                        <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-4/6"></div>
                    </div>
                    <div class="space-y-2 mb-4">
                        <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/3"></div>
                        <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/4"></div>
                    </div>
                    <div class="mt-4 flex gap-2">
                        <div class="h-10 bg-gray-200 dark:bg-gray-700 rounded flex-1"></div>
                        <div class="h-10 bg-gray-200 dark:bg-gray-700 rounded flex-1"></div>
                    </div>
                </div>
            `;
            return `
                <div class="fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <div class="h-8 bg-gray-200 dark:bg-gray-700 rounded w-48 animate-pulse"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${skeletonCard.repeat(6)}
                    </div>
                </div>
            `;
        }

        async function loadJobs() {
            if (currentView === 'jobs') {
                document.getElementById('mainContent').innerHTML = renderSkeletonGrid();
            }

            const result = await getJobs();
            if (result) {
                jobs = result.jobs;
            }

            if (currentView === 'jobs') {
                changeView('jobs');
            } else if (currentView === 'home') {
                loadStats();
            }
        }

        async function loadStats() {
            const stats = await getStats();
            const jobsCount = document.getElementById('jobsCount');

            if (jobsCount && stats) {
                // Show combined count (local + external)
                const combined = stats.combined_jobs || stats.total_jobs || 0;
                jobsCount.textContent = combined > 1000 ? combined.toLocaleString() : combined;
            } else if (jobsCount) {
                jobsCount.textContent = '--';
            }
        }

        function changeView(view) {
            currentView = view;
            const content = document.getElementById('mainContent');

            if (!content) return;

            content.innerHTML = '';

            switch (view) {
                case 'home':
                    content.innerHTML = renderHome();
                    loadStats();
                    break;
                case 'login':
                    content.innerHTML = renderLogin();
                    break;
                case 'forgotPassword':
                    content.innerHTML = renderForgotPassword();
                    break;
                case 'verifyCode':
                    content.innerHTML = renderVerifyCode();
                    break;
                case 'resetPassword':
                    content.innerHTML = renderResetPassword();
                    break;
                case 'register':
                    content.innerHTML = renderRegister();
                    break;
                case 'jobs':
                    content.innerHTML = renderJobs();
                    break;
                case 'postJob':
                    // Post Job disabled - redirect to jobs view
                    content.innerHTML = renderJobs();
                    break;
                case 'recommendations':
                    if (currentUser) {
                        content.innerHTML = renderRecommendations();
                    } else {
                        content.innerHTML = '<div class="text-center py-12 text-gray-600">You must log in to view recommendations.</div>';
                        changeView('login');
                    }
                    break;
                case 'editProfile':
                    if (currentUser) {
                        content.innerHTML = renderEditProfile();
                    } else {
                        content.innerHTML = '<div class="text-center py-12 text-gray-600">You must log in to edit your profile.</div>';
                        changeView('login');
                    }
                    break;
                case 'applications':
                    if (currentUser) {
                        content.innerHTML = renderMyApplications();
                    } else {
                        content.innerHTML = '<div class="text-center py-12 text-gray-600">You must log in to view your applications.</div>';
                        changeView('login');
                    }
                    break;
                case 'savedJobs':
                    if (currentUser) {
                        content.innerHTML = renderSavedJobs();
                    } else {
                        content.innerHTML = '<div class="text-center py-12 text-gray-600">You must log in to view your saved jobs.</div>';
                        changeView('login');
                    }
                    break;
                case 'applicationConfirm':
                    if (currentUser && currentApplyingJob) {
                        content.innerHTML = renderApplicationConfirm();
                    } else {
                        changeView('recommendations');
                    }
                    break;
                default:
                    content.innerHTML = renderHome();
                    loadStats();
            }

            renderNavigation();
        }

        // ==================== THEME TOGGLE ====================

        function updateThemeIcon() {
            const darkIcon = document.getElementById('themeToggleDarkIcon');
            const lightIcon = document.getElementById('themeToggleLightIcon');
            if (!darkIcon || !lightIcon) return;

            if (document.documentElement.classList.contains('dark')) {
                darkIcon.classList.add('hidden');
                lightIcon.classList.remove('hidden');
            } else {
                lightIcon.classList.add('hidden');
                darkIcon.classList.remove('hidden');
            }
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
            updateThemeIcon();
        }

        // Initialize app
        window.onload = async function () {
            updateThemeIcon();
            changeView('home');
            await loadJobs();
        };
    </script>
</body>

</html>
